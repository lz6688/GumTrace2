name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/ios.yml"
      - "CMakeLists.txt"
      - "build_ios.sh"
      - "libs/**"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/ios.yml"
      - "CMakeLists.txt"
      - "build_ios.sh"
      - "libs/**"
      - "src/**"

jobs:
  build-ios:
    runs-on: macos-14
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build environment
        run: |
          sw_vers
          xcodebuild -version
          cmake --version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Build iOS artifact
        run: ./build_ios.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GumTrace-ios
          path: build_ios/
          if-no-files-found: error
          retention-days: 7
